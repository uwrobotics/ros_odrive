launch:

# `can0` and `can1` are reserved by jetson hardware CAN
- node:
    pkg: "odrive_can"
    exec: "odrive_can_node"
    name: "can_node"
    namespace: "odrive_axis1"
    param:
    -
      name: "node_id"
      value: 1
    -
      name: "interface"
      value: "can2"

- node:
    pkg: "odrive_can"
    exec: "odrive_can_node"
    name: "can_node"
    namespace: "odrive_axis2"
    param:
    -
      name: "node_id"
      value: 2
    -
      name: "interface"
      value: "can2"

- node:
    pkg: "odrive_can"
    exec: "odrive_can_node"
    name: "can_node"
    namespace: "odrive_axis3"
    param:
    -
      name: "node_id"
      value: 3
    -
      name: "interface"
      value: "can2"

- node:
    pkg: "odrive_can"
    exec: "odrive_can_node"
    name: "can_node"
    namespace: "odrive_axis4"
    param:
    -
      name: "node_id"
      value: 4
    -
      name: "interface"
      value: "can2"

- node:
    pkg: "odrive_can"
    exec: "odrive_can_node"
    name: "can_node"
    namespace: "odrive_axis5"
    param:
    -
      name: "node_id"
      value: 5
